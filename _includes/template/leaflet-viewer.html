<!-- load leaflet dependencies -->
<link rel="stylesheet" href="{{ '/assets/lib' | relative_url }}/leaflet/leaflet.css">
<link rel="stylesheet" href="{{ '/assets/lib' | relative_url }}/leaflet/leaflet.fullscreen.css">
<script src="{{ '/assets/lib' | relative_url }}/leaflet/leaflet.js"></script>
<script src="{{ '/assets/lib' | relative_url }}/leaflet/Leaflet.fullscreen.min.js"></script>
<script>


// Color options for annotation tagging (Bootstrap theme colors)
const colors = {
  primary:   "#0d6efd",
  secondary: "#6c757d",
  success:   "#198754",
  danger:    "#dc3545",
  warning:   "#ffc107",
  info:      "#0dcaf0",
  dark:      "#212529"
};


/* map layer options */
var Esri_WorldStreetMap = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Street_Map/MapServer/tile/{z}/{y}/{x}', {
    attribution: 'Tiles &copy; Esri &mdash; Source: Esri, DeLorme, NAVTEQ, USGS, Intermap, iPC, NRCAN, Esri Japan, METI, Esri China (Hong Kong), Esri (Thailand), TomTom, 2012'
});
var Esri_NatGeoWorldMap = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/NatGeo_World_Map/MapServer/tile/{z}/{y}/{x}', {
    attribution: 'Tiles &copy; Esri &mdash; National Geographic, Esri, DeLorme, NAVTEQ, UNEP-WCMC, USGS, NASA, ESA, METI, NRCAN, GEBCO, NOAA, iPC',
    maxZoom: 16
});
var Esri_WorldImagery = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
    attribution: 'Tiles &copy; Esri &mdash; Source: Esri, i-cubed, USDA, USGS, AEX, GeoEye, Getmapping, Aerogrid, IGN, IGP, UPR-EGP, and the GIS User Community'
});
var OpenStreetMap_Mapnik = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
});

/* =========================================================
   Leaflet Annotation Viewer
   - Finds every div with the class .leaflet-item on the page.
   - Each div carries a data-annotation-file attribute pointing
     to a JSON file in the project's /objects/ folder.
   - Two JSON types are supported:
       "CRSFeatureCollection" → image overlay (CRS.Simple)
         requires: imageurl, width, height, features[]
       "FeatureCollection"    → standard geographic map
         requires: basemap (matches tile-layer var name), features[]
   - Each feature is a GeoJSON Point. Its properties drive:
       title       → popup heading
       description → popup body text
       color       → marker fill (key from the colors map above)
   - Read-only; no editing functionality.
   ========================================================= */

(function () {

  /* ── tile-layer lookup by the variable names used in the JSON ── */
  const tileLayers = {
    OpenStreetMap_Mapnik:  OpenStreetMap_Mapnik,
    Esri_WorldStreetMap:   Esri_WorldStreetMap,
    Esri_NatGeoWorldMap:   Esri_NatGeoWorldMap,
    Esri_WorldImagery:     Esri_WorldImagery
  };

  /* ── colored SVG pin icon (same visual style as the annotator) ── */
  function makeIcon(colorName) {
    const hex  = colors[colorName] || colors.primary;
    //const dot  = colorName === 'warning' ? '#212529' : '#ffffff';
    const dot = "#ffffff";
    const svg  = `<svg xmlns="http://www.w3.org/2000/svg" width="26" height="34" viewBox="0 0 26 34" role="img" aria-label="Map marker">
      <path d="M13 0C5.82 0 0 5.82 0 13c0 9.14 13 21 13 21S26 22.14 26 13C26 5.82 20.18 0 13 0z" fill="${hex}" stroke="rgba(0,0,0,.25)" stroke-width="1" opacity=".85"/>
      <circle cx="13" cy="13" r="5" fill="${dot}" opacity=".5"/>
    </svg>`;
    return L.divIcon({ html: svg, className: '', iconSize: [26, 34], iconAnchor: [13, 34], popupAnchor: [0, -36] });
  }

  /* ── build popup HTML from feature properties ── */
  function makePopup(props) {
    const title = props.title       ? `<h2 class="h4">${escHtml(props.title)}</h2>` : '';
    const desc  = props.description ? `<p>${escHtml(props.description)}</p>` : '';
    return `<div>${title}${desc}</div>`;
  }

  function escHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  /* ── custom Leaflet control: toggle marker layer on/off ── */
  function addToggleControl(map, markerLayer) {
    const ToggleControl = L.Control.extend({
      options: { position: 'topright' },
      onAdd: function () {
        const btn = L.DomUtil.create('button');
        btn.className = 'leaflet-bar';
        btn.style.cssText = 'width:34px;height:34px;background:#fff;border:none;cursor:pointer;font-size:18px;line-height:34px;text-align:center;display:block;';
        btn.title = 'Toggle markers';
        btn.setAttribute('aria-pressed', 'true');
        btn.innerHTML = '&#x1F4CD;';
        let visible = true;
        L.DomEvent.on(btn, 'click', function (e) {
          L.DomEvent.stopPropagation(e);
          visible = !visible;
          btn.setAttribute('aria-pressed', String(visible));
          btn.style.opacity = visible ? '1' : '0.4';
          if (visible) { markerLayer.addTo(map); }
          else { map.removeLayer(markerLayer); }
        });
        return btn;
      }
    });
    new ToggleControl().addTo(map);
  }

  /* ── initialise a CRS.Simple image viewer ── */
  function initImageViewer(el, json) {
    const w = json.width;
    const h = json.height;
    const markerLayer = L.layerGroup();

    const map = L.map(el, {
      crs:              L.CRS.Simple,
      minZoom:          -5,
      maxZoom:          5,
      fullscreenControl: true,
      attributionControl: false
    });

    // map.unproject([col, row], 0) converts pixel → Leaflet latlng
    // so that pixel origin (0,0) maps to the top-left of the image.
    const sw     = map.unproject([0, h], 0);
    const ne     = map.unproject([w, 0], 0);
    const bounds = L.latLngBounds(sw, ne);

    L.imageOverlay(json.imageurl, bounds).addTo(map);
    // Compute the exact fractional zoom that makes the image fill the container.
    // fitBounds snaps to integer zoom and leaves letterbox space; log2 of the
    // container-to-image pixel ratio gives the precise CRS.Simple zoom level.
    map.invalidateSize();
    const cW = map.getContainer().offsetWidth;
    const cH = map.getContainer().offsetHeight;
    const fillZoom = Math.log2(Math.min(cW / w, cH / h));
    const imgCenter = map.unproject([w / 2, h / 2], 0);
    map.setView(imgCenter, fillZoom, { animate: false });

    (json.features || []).forEach(function (f) {
      if (!f.geometry || f.geometry.type !== 'Point') return;
      const [px, py] = f.geometry.coordinates;        // [pixel_x, pixel_y]
      const latlng   = map.unproject([px, py], 0);
      const props    = f.properties || {};
      L.marker(latlng, { icon: makeIcon(props.color) })
        .bindPopup(makePopup(props))
        .addTo(markerLayer);
    });

    markerLayer.addTo(map);
    if (json.features && json.features.length) addToggleControl(map, markerLayer);
  }

  /* ── initialise a geographic tile-layer viewer ── */
  function initMapViewer(el, json) {
    // Fall back to OpenStreetMap if the basemap key is not recognised
    const baseLayer   = tileLayers[json.basemap] || OpenStreetMap_Mapnik;
    const markerLayer = L.layerGroup();

    const map = L.map(el, {
      center:            [20, 0],
      zoom:              3,
      fullscreenControl: true
    });

    baseLayer.addTo(map);

    const markers = [];

    (json.features || []).forEach(function (f) {
      if (!f.geometry || f.geometry.type !== 'Point') return;
      const [lng, lat] = f.geometry.coordinates;      // GeoJSON [lng, lat]
      const props      = f.properties || {};
      const m = L.marker([lat, lng], { icon: makeIcon(props.color) })
        .bindPopup(makePopup(props));
      markerLayer.addLayer(m);
      markers.push(m);
    });

    markerLayer.addTo(map);

    // Zoom map to fit all markers when there are any
    if (markers.length > 0) {
      const group = L.featureGroup(markers);
      map.fitBounds(group.getBounds().pad(0.15));
      addToggleControl(map, markerLayer);
    }
  }

  /* ── bootstrap each .leaflet-item div ── */
  document.querySelectorAll('.leaflet-item').forEach(function (el) {
    const url = el.dataset.annotationFile;
    if (!url) return;

    // Give the element a minimum height if none is set so Leaflet renders
    if (!el.style.height && el.offsetHeight === 0) {
      el.style.height = '580px';
    }

    fetch(url)
      .then(function (r) {
        if (!r.ok) throw new Error('HTTP ' + r.status + ' fetching ' + url);
        return r.json();
      })
      .then(function (json) {
        if (json.type === 'CRSFeatureCollection') {
          initImageViewer(el, json);
        } else {
          initMapViewer(el, json);
        }
      })
      .catch(function (err) {
        el.innerHTML = `<div class="alert alert-warning m-2" role="alert">
          <strong>Could not load annotation file:</strong> ${escHtml(url)}<br>
          <small class="text-muted">${escHtml(err.message)}</small>
        </div>`;
      });
  });

})();


</script>
